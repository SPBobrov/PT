<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div style="display: flex; justify-content: flex-end;">
      <button id="logout-btn" class="btn">Выйти</button>
    </div>

    <section class="global-settings">
      <div class="duration-section">
        <label for="work-duration">Длительность:</label>
        <select id="work-duration" class="duration-select">
          <option value="1500">25 минут</option>
          <option value="300">5 минут</option>
          <option value="900">15 минут</option>
          <option value="1800">30 минут</option>
          <option value="3600">60 минут</option>
          <option value="4500">75 минут</option>
          <option value="custom">Пользовательская</option>
        </select>
        <div id="custom-duration-container" style="display: none;">
          <input type="number" id="custom-minutes" min="1" value="25" class="custom-input"> минут
        </div>
      </div>
      <div class="global-comment">
        <label for="global-comment">Комментарий:</label>
        <input type="text" id="global-comment" placeholder="Что делаете?">
      </div>
    </section>

    <section class="activity-quick-panel">
      <div class="quick-buttons">
        <button class="activity-btn" data-activity="Работа">Работа</button>
        <button class="activity-btn" data-activity="Учеба">Учеба</button>
        <button class="activity-btn" data-activity="Физкультура">Физкультура</button>
        <button class="activity-btn" data-activity="Английский">Английский</button>
        <button class="activity-btn" data-activity="Вайбкодинг">Вайбкодинг</button>
        <button class="activity-btn" data-activity="Чтение">Чтение</button>
        <button class="activity-btn" data-activity="Текст">Текст</button>
        <button class="activity-btn" data-activity="Система">Система</button>
        <button class="activity-btn" id="more-activities-btn">➕</button>
      </div>
    </section>

    <section class="activity-management" id="activity-manager" style="display: none;">
      <div class="add-activity">
        <input type="text" id="new-activity-input" placeholder="Новая активность...">
        <button class="btn" id="add-activity-btn">Добавить</button>
      </div>
      <ul class="activity-list" id="activity-list"></ul>
      <button class="btn" id="close-activity-manager">Закрыть</button>
    </section>

    <div id="timers-container" class="timers-container"></div>

    <div class="footer-links">
      <span class="version">Версия 2.0.0</span>
      <a href="/history.html" target="_blank" class="history-link">История</a>
    </div>
  </main>

  <div id="activity-choice-modal" style="display: none;">
    <div>
      <h3>Выберите активность</h3>
      <div id="activity-choice-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
      <div style="display: flex; justify-content: flex-end;">
        <button class="btn" id="close-choice-modal">Отмена</button>
      </div>
    </div>
  </div>

  <audio id="timer-end-sound" src="sounds/bell.mp3" preload="auto"></audio>
  <script src="js/app.js"></script>
</body>
</html>
