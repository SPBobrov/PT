<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>История сессий</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1>Аналитика</h1>

    <div class="chart-card">
      <h2>Суммарное время</h2>
      <div class="chart-controls">
        <div>
          <label for="chart-activities">Активности (выберите несколько):</label>
          <select id="chart-activities" multiple size="4"></select>
        </div>
        <div>
          <label for="chart-start-date">Начальная дата:</label>
          <input type="date" id="chart-start-date">
        </div>
        <div>
          <label for="chart-end-date">Конечная дата:</label>
          <input type="date" id="chart-end-date">
        </div>
        <button class="btn" id="build-chart">Показать итог</button>
      </div>
      <div id="total-time-display" class="total-time-display">
        <!-- Здесь будет выводиться суммарное время -->
      </div>
    </div>

    <div class="details-section">
      <div class="details-header">
        <h2>Детальные записи</h2>
        <button class="btn" id="toggle-details">Показать</button>
      </div>
      <div class="details-content" id="details-content" style="display: none;">
        <div class="filter-bar">
          <div>
            <label for="filter-date">Дата:</label>
            <input type="date" id="filter-date">
          </div>
          <div>
            <label for="filter-activity">Активность:</label>
            <select id="filter-activity"><option value="">Все</option></select>
          </div>
          <button class="btn" id="apply-filter">Применить</button>
          <button class="btn" id="reset-filter">Сбросить</button>
        </div>

        <div style="margin-bottom: 15px;">
          <button class="btn" id="add-session-btn">➕ Добавить запись</button>
        </div>

        <div class="table-container">
          <table id="sessions-table">
            <thead>
              <tr>
                <th>Дата и время</th>
                <th>Активность</th>
                <th>Длительность</th>
                <th>Комментарий</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="sessions-list"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="version">Версия 2.1.0</div>
  </main>

  <div id="session-modal" style="display: none;">
    <div>
      <h3 id="modal-title">Добавить запись</h3>
      <form id="session-form">
        <input type="hidden" id="session-id">
        <div>
          <label for="session-datetime">Дата и время:</label>
          <input type="datetime-local" id="session-datetime" required>
        </div>
        <div>
          <label for="session-activity">Активность:</label>
          <select id="session-activity" required></select>
        </div>
        <div>
          <label for="session-minutes">Длительность (минуты):</label>
          <input type="number" id="session-minutes" min="1" required>
        </div>
        <div>
          <label for="session-comment">Комментарий:</label>
          <input type="text" id="session-comment">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="btn" id="modal-cancel">Отмена</button>
          <button type="submit" class="btn">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
